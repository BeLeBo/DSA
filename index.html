<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DSA Multiplayer FINAL LOGIN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  overflow: hidden;
}

@keyframes shake {
  0% { transform: translateX(-50%) translate(0px, 0px); }
  25% { transform: translateX(-50%) translate(-1px, 1px); }
  50% { transform: translateX(-50%) translate(1px, -1px); }
  75% { transform: translateX(-50%) translate(-1px, -1px); }
  100% { transform: translateX(-50%) translate(0px, 0px); }
}

.hp-shake {
  animation: shake 0.2s infinite;
}
#map {
  width: 100vw;
  height: 100vh;
  position: relative;
  background-size: cover;
  background-position: center;
}

.token {
  position: absolute;
  border-radius: 50%;
  user-select: none;
}



.token-dead::after {
  content: "✖";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 70px;
  color: red;
  font-weight: bold;
  text-shadow: 0 0 10px black;
  pointer-events: none;
}

/* 🆕 HP BAR STYLE */
.hp-bar-container {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 6px;
  background: rgba(0,0,0,0.6);
  border-radius: 4px;
  overflow: hidden;
}

.hp-bar-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #00ff66, #00cc44);
  transition: width 0.2s ease;
}

.hp-bar-text {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: white;
  background: rgba(0,0,0,0.5);
  padding: 1px 4px;
  border-radius: 3px;
}

#panel {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 320px;
  padding: 10px;
  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 12px;
  z-index: 999;
}

button, input, select {
  width: 100%;
  margin-top: 5px;
  padding: 6px;
}

#roleSelect {
  position: fixed;
  inset: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: white;
}

#tokenMenu {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#tokenMenuBox {
  background: #222;
  padding: 15px;
  width: 260px;
  color: white;
}

#log {
  color: #00ff88;
  white-space: pre-wrap;
  max-height: 200px;
  overflow: auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="roleSelect">
  <h2>DSA LOGIN</h2>
  <p>Spieler: Leomar / Valariel / Hesindian / Romoxosch / Angrondt</p>

  <input id="codeInput" placeholder="Codewort">
  <button onclick="login()">LOGIN</button>
  <p id="loginError" style="color:red;"></p>
</div>

<!-- PANEL -->
<div id="panel">
  <input type="file" id="mapFile">
  <button onclick="uploadMap()">MAP UPLOAD</button>

  <hr>

  <div id="dmPanel">
    <input type="file" id="tokenFile">

    <select id="tokenType">
      <option value="player">Spieler</option>
      <option value="npc">NPC</option>
      <option value="enemy">Gegner</option>
    </select>

    <select id="ownerSelect">
      <option value="">Kein Spieler</option>
    </select>
    <label>
      <input type="checkbox" id="hasMana">
      Hat magische Fähigkeiten
    </label>
    <button onclick="createToken()">TOKEN ERSTELLEN</button>
  </div>

  <div id="log">READY</div>
</div>

<!-- TOKEN MENU -->
<div id="tokenMenu">
  <div id="tokenMenuBox">
    <h3>Token Menü</h3>
    <div id="menuContent"></div>
    <button onclick="closeMenu()">Schließen</button>
  </div>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded", () => {

const SUPABASE_URL = "https://jlonorejtfhqxskmvucx.supabase.co";
const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsb25vcmVqdGZocXhza212dWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDUwNDUsImV4cCI6MjA5NTk4MTA0NX0.dohIz32Ls2vHKep-Rzl8TWMaaeokrzmBYJmSkOHfVxw";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const GAME_ID = "60fd4970-0997-483b-8ce3-ef16e32af460";

const map = document.getElementById("map");

let ROLE = null;
let PLAYER_ID = null;
let tokens = [];
let dragging = null;
let offsetX = 0;
let offsetY = 0;
let selectedToken = null;

/* LOGIN */
window.login = function () {

  const code = document.getElementById("codeInput").value.trim();
  const players = ["Leomar", "Valariel", "Hesindian", "Romoxosch", "Angrondt"];

  if (code === "Meister67") {
    ROLE = "dm";
    PLAYER_ID = "dm";
  }
  else if (players.includes(code)) {
    ROLE = "player";
    PLAYER_ID = code;
  }
  else {
    document.getElementById("loginError").innerText = "❌ Falsches Codewort";
    return;
  }

  document.getElementById("roleSelect").style.display = "none";

  if (ROLE !== "dm") {
  document.getElementById("panel").style.display = "none";
}

  startGame();
};

function startGame() {
  loadMap();
  loadTokens();
  setupRealtime();
  loadPlayersIntoSelect();
}

/* PLAYERS */
async function loadPlayersIntoSelect() {
  const players = ["Leomar", "Valariel", "Hesindian", "Romoxosch", "Angrondt"];

  const select = document.getElementById("ownerSelect");
  select.innerHTML = `<option value="">Kein Spieler</option>`;

  players.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

/* MAP */
async function loadMap() {
  const { data } = await client
    .from("maps")
    .select("*")
    .eq("game_id", GAME_ID)
    .order("created_at", { ascending: false })
    .limit(1);

  if (data?.length) {
    map.style.backgroundImage = `url(${data[0].image_url})`;
  }
}

/* UPLOAD MAP */
window.uploadMap = async function () {

  if (ROLE !== "dm") return;

  const file = document.getElementById("mapFile").files[0];
  if (!file) return;

  const fileName = Date.now() + "_" + file.name;

  await client.storage.from("maps").upload(fileName, file);

  const url = client.storage.from("maps").getPublicUrl(fileName).data.publicUrl;

  await client.from("maps").insert({
    game_id: GAME_ID,
    image_url: url
  });

  loadMap();
};

/* CREATE TOKEN */
window.createToken = async function () {

  if (ROLE !== "dm") return;

  const file = document.getElementById("tokenFile").files[0];
  if (!file) return;

  const type = document.getElementById("tokenType").value;
  const owner_id = document.getElementById("ownerSelect").value || null;
  const hasMana = document.getElementById("hasMana").checked;

  const fileName = "token_" + Date.now() + "_" + file.name;

  await client.storage.from("maps").upload(fileName, file);

  const url = client.storage.from("maps").getPublicUrl(fileName).data.publicUrl;

  const rect = map.getBoundingClientRect();

  await client.from("tokens").insert({
   game_id: GAME_ID,
   x: rect.width / 2,
   y: rect.height / 2,
   size: 60,

   hp_current: 10,
   hp_max: 10,

   mana_current: hasMana ? 20 : null,
   mana_max: hasMana ? 20 : null,

   token_type: type,
   owner_id: owner_id,
   image_url: url
});
};

/* LOAD TOKENS */
async function loadTokens() {
  const { data } = await client.from("tokens")
    .select("*")
    .eq("game_id", GAME_ID);

  tokens = data || [];
  renderTokens();
}

function getHPDisplay(t) {

  if (ROLE === "dm") {
    return `${t.hp_current ?? 0}/${t.hp_max ?? 0}`;
  }

  // Spieler sehen nur grobe Infos
  const percent = (t.hp_current / t.hp_max) * 100;

  if (percent <= 0) return "☠️";
  if (percent <= 20) return "sehr schwach";
  if (percent <= 40) return "schwach";
  if (percent <= 70) return "verletzt";
  if (percent <= 90) return "leicht verletzt";
  return "gesund";
}

/* RENDER TOKENS */
function renderTokens() {

  map.querySelectorAll(".token").forEach(t => t.remove());

  for (const t of tokens) {

    const el = document.createElement("div");
    el.className = "token";

    el.style.width = (t.size || 60) + "px";
    el.style.height = (t.size || 60) + "px";

    el.style.left = t.x + "px";
    el.style.top = t.y + "px";

    if (t.image_url) {
      el.style.backgroundImage = `url(${t.image_url})`;
      el.style.backgroundSize = "cover";
      el.style.backgroundPosition = "center";
    }

    const isOwner = (ROLE === "dm" || t.owner_id === PLAYER_ID);
    const isPlayerToken = t.token_type === "player";
    const isDead = (t.hp_current <= 0);

    el.onmousedown = (e) => {
      if (!isOwner) return;
      dragging = t;
      offsetX = e.offsetX;
      offsetY = e.offsetY;
    };

    el.oncontextmenu = (e) => {
      e.preventDefault();
      if (!isOwner) return;
      openMenu(t);
    };

    /* =========================
       DEAD TOKEN
    ========================= */
    if (isDead) {
      el.classList.add("token-dead");
      map.appendChild(el);
      continue;
    }

    /* =========================
       HP BAR
    ========================= */
    const container = document.createElement("div");
    container.className = "hp-bar-container";

    const fill = document.createElement("div");
    fill.className = "hp-bar-fill";

    const hpPercent = (t.hp_current / t.hp_max) * 100;

    let displayPercent = hpPercent;

    if (ROLE !== "dm" && !isPlayerToken) {
      if (hpPercent > 66) displayPercent = 100;
      else if (hpPercent > 33) displayPercent = 66;
      else if (hpPercent > 0) displayPercent = 33;
      else displayPercent = 0;
    }

    fill.style.width = displayPercent + "%";

    if (hpPercent < 35) {
      fill.style.background = "linear-gradient(90deg,#ff4444,#cc0000)";
    }

    const text = document.createElement("div");
    text.className = "hp-bar-text";

    text.innerText =
      ROLE === "dm"
        ? `${t.hp_current}/${t.hp_max}`
        : (displayPercent === 100 ? "voll"
          : displayPercent === 66 ? "verletzt"
          : displayPercent === 33 ? "stark verletzt"
          : "kritisch");

    container.appendChild(fill);
    container.appendChild(text);
    el.appendChild(container);

    /* =========================
       MANA BAR
    ========================= */
    if (t.mana_max != null && (ROLE === "dm" || isPlayerToken)) {

      const manaContainer = document.createElement("div");
      manaContainer.className = "hp-bar-container";
      manaContainer.style.bottom = "-22px";

      const manaFill = document.createElement("div");
      manaFill.className = "hp-bar-fill";

      const manaPercent =
        Math.max(0, Math.min(100,
        (t.mana_current / t.mana_max) * 100));

      manaFill.style.width = manaPercent + "%";
      manaFill.style.background = "linear-gradient(90deg,#33aaff,#0066ff)";

      const manaText = document.createElement("div");
      manaText.className = "hp-bar-text";
      manaText.innerText = `${t.mana_current}/${t.mana_max}`;

      manaContainer.appendChild(manaFill);
      manaContainer.appendChild(manaText);

      el.appendChild(manaContainer);
    }

    map.appendChild(el);
  }
}

   
/* DRAG */
document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  const rect = map.getBoundingClientRect();

  dragging.x = e.clientX - rect.left - offsetX;
  dragging.y = e.clientY - rect.top - offsetY;

  renderTokens();
});

document.addEventListener("mouseup", async () => {
  if (!dragging) return;

  const t = dragging;
  dragging = null;

  await client.from("tokens")
    .update({ x: t.x, y: t.y })
    .eq("id", t.id);
});

/* MENU */
function openMenu(token) {

  selectedToken = token;

  const isDM = ROLE === "dm";
  const isOwner = (ROLE === "dm" || token.owner_id === PLAYER_ID);

  const box = document.getElementById("menuContent");
  box.innerHTML = "";

  /* =========================
     PLAYER VIEW (ONLY HP)
  ========================= */
  if (isOwner) {

  box.innerHTML += `
    <div style="margin-bottom:10px;"><b>HP</b></div>

    <div style="display:flex; gap:5px; align-items:center; margin-bottom:6px;">
      <span style="width:80px;">Aktuell: ${token.hp_current ?? 0}</span>
      <input id="hpInput" placeholder="Neue HP" style="width:90px;">
      <button onclick="updateHP()" style="width:40px;">✔</button>
    </div>

    <div style="margin-bottom:10px;"><b>Max HP</b></div>

    <div style="display:flex; gap:5px; align-items:center;">
      <span style="width:80px;">Aktuell: ${token.hp_max ?? 0}</span>
      <input id="hpMaxInput" placeholder="Neue Max HP" style="width:90px;">
      <button onclick="updateHP()" style="width:40px;">✔</button>
    </div>
    ${token.mana_max != null ? `

    <div style="margin-top:12px;"><b>Mana</b></div>

    <div style="display:flex; gap:5px; align-items:center; margin-bottom:6px;">
      <span style="width:80px;">Aktuell: ${token.mana_current ?? 0}</span>
      <input id="manaInput" placeholder="Neues Mana" style="width:90px;">
      <button onclick="updateHP()" style="width:40px;">✔</button>
    </div>

    <div style="margin-bottom:10px;"><b>Max Mana</b></div>

    <div style="display:flex; gap:5px; align-items:center;">
      <span style="width:80px;">Aktuell: ${token.mana_max ?? 0}</span>
      <input id="manaMaxInput" placeholder="Neues Max Mana" style="width:90px;">
      <button onclick="updateHP()" style="width:40px;">✔</button>
    </div>
    ` : ""}
  `;
}

  /* =========================
     DM VIEW (FULL CONTROL)
  ========================= */
  if (isDM) {

    box.innerHTML += `
      

      <input id="sizeInput" placeholder="Größe">
      <button onclick="resizeToken()">Resize</button>
      <button onclick="deleteToken()">Delete</button>
    `;
  }

  document.getElementById("tokenMenu").style.display = "flex";
}
window.changeHP = async function (val) {

  const newHP = (selectedToken.hp_current || 0) + val;

  await client.from("tokens")
    .update({ hp_current: newHP })
    .eq("id", selectedToken.id);

  loadTokens();
};

window.changeMaxHP = async function (val) {

  const newMax = (selectedToken.hp_max || 0) + val;

  await client.from("tokens")
    .update({ hp_max: newMax })
    .eq("id", selectedToken.id);

  loadTokens();
};
window.closeMenu = function () {
  selectedToken = null;
  document.getElementById("tokenMenu").style.display = "none";
};

window.deleteToken = async function () {
  if (ROLE !== "dm") return;
  await client.from("tokens").delete().eq("id", selectedToken.id);
  closeMenu();
};

window.resizeToken = async function () {
  if (ROLE !== "dm") return;

  const size = parseInt(document.getElementById("sizeInput").value);
  await client.from("tokens").update({ size }).eq("id", selectedToken.id);

  closeMenu();
};

window.updateHP = async function () {

  if (!selectedToken) return;

  const updates = {};

  const hpInput = document.getElementById("hpInput")?.value;
  const hpMaxInput = document.getElementById("hpMaxInput")?.value;

  const manaInput =
    document.getElementById("manaInput")?.value;

  const manaMaxInput =
    document.getElementById("manaMaxInput")?.value;

  if (hpInput !== "") updates.hp_current = parseInt(hpInput);
  if (hpMaxInput !== "") updates.hp_max = parseInt(hpMaxInput);
  if (manaInput !== "")
    updates.mana_current = parseInt(manaInput);

if (manaMaxInput !== "")
  updates.mana_max = parseInt(manaMaxInput);

  if (Object.keys(updates).length === 0) return;

  await client.from("tokens")
    .update(updates)
    .eq("id", selectedToken.id);

  closeMenu();
};

/* REALTIME */
function setupRealtime() {
  client.channel("tokens-live")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "tokens"
    }, () => loadTokens())
    .subscribe();

  client.channel("maps-live")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "maps"
    }, () => loadMap())
    .subscribe();
}

});

</script>

</body>
</html>
