<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DSA Multiplayer FULL</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  overflow: hidden;
}

/* MAP */
#map {
  width: 100vw;
  height: 100vh;
  position: relative;
  background-size: cover;
  background-position: center;
}

/* TOKEN */
.token {
  position: absolute;
  border-radius: 50%;
  border: none;
  background: transparent;
  cursor: default;
  overflow: hidden;
  user-select: none;
  box-shadow: 0 0 6px rgba(0,0,0,0.4);
}

/* PANEL */
#panel {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 320px;
  padding: 10px;
  background: rgba(0,0,0,0.85);
  color: white;
  font-size: 12px;
  z-index: 999;
}

button {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  cursor: pointer;
}

#log {
  margin-top: 10px;
  max-height: 200px;
  overflow: auto;
  color: #00ff88;
  white-space: pre-wrap;
}

/* ROLE SCREEN */
#roleSelect {
  position: fixed;
  inset: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 9999;
}

/* =========================
   TOKEN MENU (NEW UI)
========================= */
#tokenMenu {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10000;
}

#tokenMenuBox {
  width: 260px;
  padding: 15px;
  background: #222;
  color: white;
  border-radius: 10px;
  text-align: center;
}

#tokenMenuBox button {
  margin-top: 8px;
}

#sizeInput {
  width: 100%;
  margin-top: 10px;
  padding: 6px;
}
</style>
</head>

<body>

<!-- ROLE SELECT -->
<div id="roleSelect">
  <h2>Rolle wählen</h2>
  <button onclick="setRole('dm')">👑 Meister</button>
  <button onclick="setRole('player')">👤 Spieler</button>
</div>

<!-- PANEL -->
<div id="panel">
  <input type="file" id="mapFile">
  <button onclick="uploadMap()">📤 MAP UPLOAD</button>

  <hr>

  <input type="file" id="tokenFile">
  <button onclick="createToken()">➕ TOKEN ERSTELLEN</button>

  <div id="log">READY...</div>
</div>

<!-- TOKEN MENU -->
<div id="tokenMenu">
  <div id="tokenMenuBox">
    <h3>Token Aktion</h3>

    <button onclick="menuResize()">📏 Größe ändern</button>
    <button onclick="menuDelete()">🗑 Löschen</button>
    <button onclick="closeMenu()">❌ Abbrechen</button>

    <input id="sizeInput" type="number" placeholder="Neue Größe (40-200)">
  </div>
</div>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* =========================
   SUPABASE
========================= */
const SUPABASE_URL = "https://jlonorejtfhqxskmvucx.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsb25vcmVqdGZocXhza212dWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDUwNDUsImV4cCI6MjA5NTk4MTA0NX0.dohIz32Ls2vHKep-Rzl8TWMaaeokrzmBYJmSkOHfVxw";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const GAME_ID = "60fd4970-0997-483b-8ce3-ef16e32af460";

const map = document.getElementById("map");
const logEl = document.getElementById("log");

/* =========================
   STATE
========================= */
let ROLE = null;
let tokens = [];
let dragging = null;
let offsetX = 0;
let offsetY = 0;
let selectedToken = null;

/* =========================
   LOG
========================= */
function log(msg) {
  console.log(msg);
  logEl.innerText += "\n" + msg;
}

/* =========================
   ROLE
========================= */
function setRole(role) {
  ROLE = role;
  document.getElementById("roleSelect").style.display = "none";
  log("ROLE: " + role);

  if (ROLE === "player") {
    document.getElementById("panel").style.display = "none";
  }
}

/* =========================
   TOKEN MENU
========================= */
function openMenu(token) {
  if (ROLE !== "dm") return;

  selectedToken = token;
  document.getElementById("tokenMenu").style.display = "flex";
}

function closeMenu() {
  selectedToken = null;
  document.getElementById("tokenMenu").style.display = "none";
}

async function menuDelete() {

  if (!selectedToken) return;

  const ok = confirm("Token wirklich löschen?");
  if (!ok) return;

  await client.from("tokens")
    .delete()
    .eq("id", selectedToken.id);

  log("🗑 TOKEN DELETED");
  closeMenu();
}

async function menuResize() {

  if (!selectedToken) return;

  const input = document.getElementById("sizeInput");
  const newSize = parseInt(input.value);

  if (isNaN(newSize)) {
    log("❌ Ungültige Größe");
    return;
  }

  await client.from("tokens")
    .update({ size: newSize })
    .eq("id", selectedToken.id);

  log("📏 SIZE UPDATED");
  closeMenu();
}

/* =========================
   MAP LOAD
========================= */
async function loadMap() {

  const { data } = await client
    .from("maps")
    .select("*")
    .eq("game_id", GAME_ID)
    .order("created_at", { ascending: false })
    .limit(1);

  if (data?.length) {
    map.style.backgroundImage = `url(${data[0].image_url})`;
  }
}

/* =========================
   MAP UPLOAD
========================= */
async function uploadMap() {

  if (ROLE !== "dm") return log("❌ no permission");

  const file = document.getElementById("mapFile").files[0];
  if (!file) return;

  const fileName = Date.now() + "_" + file.name;

  const { error } = await client.storage
    .from("maps")
    .upload(fileName, file);

  if (error) return log(JSON.stringify(error));

  const { data } = client.storage
    .from("maps")
    .getPublicUrl(fileName);

  await client.from("maps").insert({
    game_id: GAME_ID,
    image_url: data.publicUrl
  });

  log("✔ MAP UPLOADED");
  loadMap();
}

/* =========================
   TOKEN CREATE
========================= */
async function createToken() {

  if (ROLE !== "dm") return log("❌ no permission");

  const file = document.getElementById("tokenFile").files[0];
  if (!file) return;

  const fileName = "token_" + Date.now() + "_" + file.name;

  const { error } = await client.storage
    .from("maps")
    .upload(fileName, file);

  if (error) return log(JSON.stringify(error));

  const { data } = client.storage
    .from("maps")
    .getPublicUrl(fileName);

  const rect = map.getBoundingClientRect();

  const { error: insertError } = await client.from("tokens").insert({
    game_id: GAME_ID,
    x: rect.width / 2,
    y: rect.height / 2,
    size: 60,
    image_url: data.publicUrl
  });

  if (insertError) return log(JSON.stringify(insertError));

  log("✔ TOKEN CREATED");
}

/* =========================
   LOAD TOKENS
========================= */
async function loadTokens() {

  const { data, error } = await client
    .from("tokens")
    .select("*")
    .eq("game_id", GAME_ID);

  if (error) return log(JSON.stringify(error));

  tokens = data || [];
  renderTokens();
}

/* =========================
   RENDER TOKENS
========================= */
function renderTokens() {

  map.querySelectorAll(".token").forEach(t => t.remove());

  for (const t of tokens) {

    const size = t.size || 60;

    const el = document.createElement("div");
    el.className = "token";

    el.style.width = size + "px";
    el.style.height = size + "px";

    el.style.left = t.x + "px";
    el.style.top = t.y + "px";

    if (t.image_url) {
      el.style.backgroundImage = `url("${t.image_url}")`;
      el.style.backgroundSize = "cover";
      el.style.backgroundPosition = "center";
      el.style.backgroundRepeat = "no-repeat";
      el.style.backgroundColor = "transparent";
    }

    /* DRAG */
    el.onmousedown = (e) => {
      if (ROLE !== "dm") return;
      dragging = t;
      offsetX = e.offsetX;
      offsetY = e.offsetY;
    };

    /* RIGHT CLICK → MENU */
    el.oncontextmenu = (e) => {
      e.preventDefault();
      if (ROLE !== "dm") return;
      openMenu(t);
    };

    map.appendChild(el);
  }
}

/* =========================
   DRAG MOVE
========================= */
document.addEventListener("mousemove", (e) => {

  if (!dragging) return;

  const rect = map.getBoundingClientRect();

  dragging.x = e.clientX - rect.left - offsetX;
  dragging.y = e.clientY - rect.top - offsetY;

  renderTokens();
});

/* =========================
   DROP SAVE
========================= */
document.addEventListener("mouseup", async () => {

  if (!dragging) return;

  const t = dragging;
  dragging = null;

  await client.from("tokens")
    .update({
      x: t.x,
      y: t.y,
      size: t.size || 60
    })
    .eq("id", t.id);
});

/* =========================
   REALTIME
========================= */
client
  .channel("tokens-live")
  .on("postgres_changes", {
    event: "*",
    schema: "public",
    table: "tokens"
  }, () => loadTokens())
  .subscribe();

/* =========================
   START
========================= */
loadTokens();
loadMap();

</script>

</body>
</html>
